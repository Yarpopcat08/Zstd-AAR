name: Build ZSTD for Distant Horizons mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Rename for DH
        run: bash ./renamer.sh
      - name: Build
        run: gradlew :app:assemble
      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: zstd-release-dh.aar
          path: app/build/outputs/aar/app-release.aar